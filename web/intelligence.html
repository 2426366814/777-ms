<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能功能 - 777-MS</title>
    <link rel="stylesheet" href="styles.css?v=20260301-v3">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .provider-select {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
            max-height: 300px;
            overflow-y: auto;
        }
        .provider-select .list-item {
            width: 100%;
            box-sizing: border-box;
        }
        .provider-option {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
        }
        .provider-option:hover {
            background: var(--bg-tertiary);
        }
        .provider-option.selected {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border-color: var(--accent-cyan);
        }
        .model-select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.875rem;
            margin-bottom: 12px;
        }
        .model-select:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }
        .extract-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .auto-tag-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--bg-secondary);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .toggle-switch.active {
            background: var(--accent-cyan);
        }
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: all 0.3s;
        }
        .toggle-switch.active::after {
            left: 23px;
        }
        .memory-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .memory-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .memory-type {
            padding: 2px 8px;
            background: rgba(0,255,170,0.1);
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--accent-cyan);
        }
        .memory-importance {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .memory-content {
            font-size: 0.875rem;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .memory-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .memory-tag {
            padding: 2px 8px;
            background: var(--bg-tertiary);
            border-radius: 10px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .llm-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
        }
        .status-dot.error {
            background: var(--accent-red);
        }
        .status-dot.loading {
            background: var(--accent-orange);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = '/api/v1';
        let token = localStorage.getItem('token');
        let user = JSON.parse(localStorage.getItem('user') || '{}');
        let extractedMemories = [];
        let providers = [];
        let selectedProvider = null;
        let selectedModel = null;
        let autoTagEnabled = true;

        if (!token) window.location.href = '/';
        if (user.role === 'admin') document.getElementById('adminLink').style.display = 'flex';

        function showToast(msg) { 
            const t = document.getElementById('toast'); 
            t.textContent = msg; 
            t.classList.add('show'); 
            setTimeout(() => t.classList.remove('show'), 2000); 
        }
        
        async function api(e, o = {}) { 
            const r = await fetch(API_BASE + e, { 
                ...o, 
                headers: { 
                    'Authorization': 'Bearer ' + token, 
                    'Content-Type': 'application/json', 
                    ...o.headers 
                } 
            }); 
            return r.json(); 
        }

        function logout() {
            const token = localStorage.getItem('token');
            
            // Call backend logout API to blacklist token
            if (token) {
                fetch('/api/v1/user/logout', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                }).catch(err => {
                    console.log('Logout API call failed:', err);
                });
            }
            
            // Clear local storage
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            
            // Redirect to login page
            window.location.href = '/login';
        }

        function showPanel(name) {
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(name + '-panel').style.display = 'block';
            document.querySelector(`.tab[data-panel="${name}"]`).classList.add('active');
            
            const loaders = { 
                extract: () => {}, 
                tags: () => {}, 
                importance: () => {}, 
                entities: loadEntities, 
                graph: loadGraph 
            };
            if (loaders[name]) loaders[name]();
        }

        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('refreshBtn').addEventListener('click', refreshData);
        document.getElementById('mainTabs').addEventListener('click', function(e) {
            const tab = e.target.closest('.tab');
            if (tab) {
                showPanel(tab.dataset.panel);
            }
        });
        document.getElementById('autoTagToggle').addEventListener('click', toggleAutoTag);
        document.getElementById('extractBtn').addEventListener('click', extractMemories);
        document.getElementById('clearExtractBtn').addEventListener('click', clearExtract);
        document.getElementById('saveBtn').addEventListener('click', saveExtracted);
        document.getElementById('generateTagsBtn').addEventListener('click', generateTags);
        document.getElementById('loadUntaggedBtn').addEventListener('click', loadUntaggedMemories);
        document.getElementById('applyTagsBtn').addEventListener('click', applyTagsToMemoryDirect);
        document.getElementById('batchGenerateTagsBtn').addEventListener('click', batchGenerateTags);
        document.getElementById('assessImportanceBtn').addEventListener('click', assessImportance);

        async function loadProviders() {
            const statusDot = document.getElementById('llmStatusDot');
            const statusText = document.getElementById('llmStatusText');
            
            statusDot.className = 'status-dot loading';
            statusText.textContent = '正在检查 LLM 提供商...';
            
            try {
                const res = await api('/providers/providers');
                if (res.success) {
                    providers = res.providers || [];
                    
                    if (providers.length === 0) {
                        statusDot.className = 'status-dot error';
                        statusText.textContent = '未配置 LLM 提供商，请先添加';
                        return;
                    }
                    
                    statusDot.className = 'status-dot';
                    statusText.textContent = `${providers.length} 个 LLM 提供商可用`;
                    
                    renderProviderSelect('providerSelect');
                    renderProviderSelect('tagProviderSelect');
                    renderProviderSelect('importanceProviderSelect');
                }
            } catch (err) {
                statusDot.className = 'status-dot error';
                statusText.textContent = '加载提供商失败: ' + err.message;
            }
        }

        function renderProviderSelect(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            container.innerHTML = providers.map((p, index) => `
                <div class="list-item provider-option" style="display:flex;align-items:center;gap:10px;cursor:pointer;width:100%;box-sizing:border-box;${selectedProvider === p.id ? 'background:var(--bg-tertiary);' : ''}" data-provider-id="${p.id}" data-container-id="${containerId}">
                    <div class="item-index" style="min-width:24px;height:24px;background:var(--gradient-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.7rem;color:#fff;flex-shrink:0;">${index + 1}</div>
                    <div style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.display_name || p.name}</div>
                </div>
            `).join('');
            
            if (!selectedProvider && providers.length > 0) {
                selectProvider(providers[0].id, containerId);
            }
        }

        document.addEventListener('click', function(e) {
            const providerOption = e.target.closest('.provider-option');
            if (providerOption) {
                selectProvider(providerOption.dataset.providerId, providerOption.dataset.containerId);
            }
            
            const copyTagsBtn = e.target.closest('.copy-tags-btn');
            if (copyTagsBtn) {
                const tags = JSON.parse(copyTagsBtn.dataset.tags);
                copyTags(tags);
            }
            
            const generateTagBtn = e.target.closest('.generate-tag-btn');
            if (generateTagBtn) {
                generateTagsForMemory(parseInt(generateTagBtn.dataset.memoryIndex));
            }
            
            const removableTag = e.target.closest('.removable-tag');
            if (removableTag) {
                removeTag(parseInt(removableTag.dataset.memoryIndex), removableTag.dataset.tag);
            }
            
            const applyTagsDirectBtn = e.target.closest('.apply-tags-direct-btn');
            if (applyTagsDirectBtn) {
                applyTagsToMemoryDirect(parseInt(applyTagsDirectBtn.dataset.memoryIndex));
            }
        });

        function selectProvider(providerId, containerId) {
            selectedProvider = providerId;
            
            const container = document.getElementById(containerId);
            if (container) {
                container.querySelectorAll('.provider-option').forEach(opt => {
                    opt.classList.toggle('selected', opt.textContent.trim() === (providers.find(p => p.id === providerId)?.display_name || providers.find(p => p.id === providerId)?.name));
                });
            }
            
            const provider = providers.find(p => p.id === providerId);
            if (provider) {
                updateModelSelect(provider);
            }
        }

        function updateModelSelect(provider) {
            const modelSelect = document.getElementById('modelSelect');
            if (!modelSelect) return;
            
            let models = [];
            try {
                models = typeof provider.models === 'string' ? JSON.parse(provider.models) : (provider.models || []);
            } catch { models = []; }
            
            if (provider.default_model) {
                models.unshift(provider.default_model);
            }
            
            modelSelect.innerHTML = '<option value="">选择模型</option>' + 
                [...new Set(models)].map(m => `<option value="${m}">${m}</option>`).join('');
            
            if (provider.default_model) {
                modelSelect.value = provider.default_model;
                selectedModel = provider.default_model;
            }
            
            modelSelect.onchange = () => {
                selectedModel = modelSelect.value;
            };
        }

        function toggleAutoTag() {
            autoTagEnabled = !autoTagEnabled;
            document.getElementById('autoTagToggle').classList.toggle('active', autoTagEnabled);
        }

        async function extractMemories() {
            const content = document.getElementById('extractInput').value.trim();
            if (!content) {
                showToast('请输入对话内容');
                return;
            }
            
            if (!selectedProvider) {
                showToast('请选择 LLM 提供商');
                return;
            }
            
            const btn = document.getElementById('extractBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner" style="width: 16px; height: 16px;"></div> 提取中...';
            
            try {
                const data = await api('/intelligence/extract', {
                    method: 'POST',
                    body: JSON.stringify({ 
                        message: content, 
                        provider: selectedProvider,
                        model: selectedModel,
                        autoTag: autoTagEnabled
                    })
                });
                
                if (data.success && data.memories?.length > 0) {
                    extractedMemories = data.memories;
                    
                    const el = document.getElementById('extractPreview');
                    el.className = 'list-container';
                    el.innerHTML = data.memories.map((m, i) => `
                        <div class="memory-card" style="display:flex;align-items:flex-start;gap:12px;">
                            <div class="item-index" style="min-width:28px;height:28px;background:var(--gradient-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.75rem;color:#fff;flex-shrink:0;">${i + 1}</div>
                            <div style="flex:1;min-width:0;">
                                <div class="memory-card-header">
                                    <span class="memory-type">${m.type || '记忆'}</span>
                                    <span class="memory-importance">重要性: ${((m.importance || 0.5) * 100).toFixed(0)}%</span>
                                </div>
                                <div class="memory-content" style="overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;">${m.content}</div>
                                ${m.tags?.length ? `
                                    <div class="memory-tags">
                                        ${m.tags.map(t => `<span class="memory-tag">#${t}</span>`).join('')}
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `).join('');
                    
                    document.getElementById('extractCountBadge').style.display = 'inline';
                    document.getElementById('extractCountBadge').textContent = `${data.memories.length} 条`;
                    document.getElementById('saveBtn').style.display = 'inline-flex';
                    
                    showToast(`成功提取 ${data.memories.length} 条记忆`);
                } else {
                    showToast('未提取到有价值的记忆');
                    document.getElementById('extractPreview').innerHTML = '<div class="empty-state"><p>未提取到有价值的记忆</p></div>';
                }
            } catch (err) {
                showToast('提取失败: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/></svg> 提取记忆';
            }
        }

        function clearExtract() {
            document.getElementById('extractInput').value = '';
            document.getElementById('extractPreview').innerHTML = '<div class="empty-state"><p>提取的记忆将显示在这里</p></div>';
            document.getElementById('extractCountBadge').style.display = 'none';
            document.getElementById('saveBtn').style.display = 'none';
            extractedMemories = [];
        }

        async function saveExtracted() {
            if (extractedMemories.length === 0) return;
            
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.textContent = '保存中...';
            
            try {
                const data = await api('/intelligence/save', {
                    method: 'POST',
                    body: JSON.stringify({ memories: extractedMemories })
                });
                
                if (data.success) {
                    showToast(`已保存 ${data.saved.length} 条记忆`);
                    clearExtract();
                    loadStats();
                }
            } catch (err) {
                showToast('保存失败: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> 保存到记忆库';
            }
        }

        async function generateTags() {
            const content = document.getElementById('tagInput').value.trim();
            if (!content) {
                showToast('请输入内容');
                return;
            }
            
            document.getElementById('tagResult').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const data = await api('/intelligence/tags/generate', {
                    method: 'POST',
                    body: JSON.stringify({ 
                        content,
                        provider: selectedProvider
                    })
                });
                
                if (data.success) {
                    window.currentGeneratedTags = data.tags;
                    document.getElementById('tagResult').innerHTML = `
                        <div style="display: flex; gap: 8px; flex-wrap: wrap; padding: 16px;">
                            ${data.tags.map(t => `<span class="memory-tag" style="padding: 8px 16px; font-size: 0.875rem;">#${t}</span>`).join('')}
                        </div>
                        <div style="padding: 16px; border-top: 1px solid var(--border-color);">
                            <button class="btn btn-secondary copy-tags-btn" data-tags='${JSON.stringify(data.tags)}'>
                                复制所有标签
                            </button>
                        </div>
                    `;
                }
            } catch (err) {
                document.getElementById('tagResult').innerHTML = `<div class="empty-state"><p style="color: var(--accent-red);">生成失败: ${err.message}</p></div>`;
            }
        }
        
        let untaggedMemories = [];
        let currentTagMemory = null;
        
        async function loadUntaggedMemories() {
            try {
                const data = await api('/memories?limit=20');
                if (data.success && data.data?.memories) {
                    untaggedMemories = data.data.memories.filter(m => !m.tags || m.tags.length === 0);
                    
                    if (untaggedMemories.length === 0) {
                        document.getElementById('batchTagList').innerHTML = '<div class="empty-state"><p>所有记忆都已有标签</p></div>';
                        return;
                    }
                    
                    renderBatchTagList();
                    showToast(`找到 ${untaggedMemories.length} 条无标签记忆`);
                }
            } catch (err) {
                showToast('加载失败: ' + err.message);
            }
        }
        
        function renderBatchTagList() {
            const el = document.getElementById('batchTagList');
            el.className = 'list-container';
            el.innerHTML = untaggedMemories.map((m, i) => `
                <div class="list-item" id="batch-item-${m.id}" style="display:flex;align-items:center;gap:12px;width:100%;box-sizing:border-box;">
                    <div class="item-index" style="min-width:28px;height:28px;background:var(--gradient-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.75rem;color:#fff;flex-shrink:0;">${i + 1}</div>
                    <div class="list-item-content" style="flex:1;min-width:0;">
                        <div class="list-item-title" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${m.content || ''}">${(m.content || '').substring(0, 60)}${m.content?.length > 60 ? '...' : ''}</div>
                        <div class="list-item-meta" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
                            <span>重要性: ${m.importance || 5}</span>
                            <span>·</span>
                            <span>${m.created_at ? new Date(m.created_at).toLocaleDateString() : ''}</span>
                        </div>
                    </div>
                    <div id="tags-${m.id}" style="display: flex; gap: 4px; flex-wrap: wrap; max-width: 200px; flex-shrink:0;">
                        ${m.tags?.length ? m.tags.map(t => `<span class="memory-tag">#${t}</span>`).join('') : '<span style="color: var(--text-muted); font-size: 0.75rem;">无标签</span>'}
                    </div>
                    <button class="btn btn-secondary btn-sm flex-shrink-0 generate-tag-btn" data-memory-index="${i}">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/></svg>
                    </button>
                </div>
            `).join('');
        }
        
        async function generateTagsForMemory(index) {
            const memory = untaggedMemories[index];
            if (!memory) return;
            
            currentTagMemory = memory;
            const tagsContainer = document.getElementById(`tags-${memory.id}`);
            tagsContainer.innerHTML = '<div class="spinner" style="width: 16px; height: 16px;"></div>';
            
            try {
                const data = await api('/intelligence/tags/generate', {
                    method: 'POST',
                    body: JSON.stringify({ 
                        content: memory.content,
                        provider: selectedProvider
                    })
                });
                
                if (data.success && data.tags?.length > 0) {
                    memory.generatedTags = data.tags;
                    tagsContainer.innerHTML = data.tags.map(t => 
                        `<span class="memory-tag removable-tag" style="cursor: pointer;" data-memory-index="${index}" data-tag="${t}">#${t}</span>`
                    ).join('');
                    
                    const applyBtn = document.createElement('button');
                    applyBtn.className = 'btn btn-primary btn-sm apply-tags-direct-btn';
                    applyBtn.style.marginLeft = '8px';
                    applyBtn.textContent = '应用';
                    applyBtn.dataset.memoryIndex = index;
                    tagsContainer.appendChild(applyBtn);
                } else {
                    tagsContainer.innerHTML = '<span style="color: var(--text-muted);">无法生成标签</span>';
                }
            } catch (err) {
                tagsContainer.innerHTML = `<span style="color: var(--accent-red);">失败</span>`;
            }
        }
        
        function removeTag(memoryIndex, tag) {
            const memory = untaggedMemories[memoryIndex];
            if (memory?.generatedTags) {
                memory.generatedTags = memory.generatedTags.filter(t => t !== tag);
                const tagsContainer = document.getElementById(`tags-${memory.id}`);
                tagsContainer.innerHTML = memory.generatedTags.map(t => 
                    `<span class="memory-tag removable-tag" style="cursor: pointer;" data-memory-index="${memoryIndex}" data-tag="${t}">#${t}</span>`
                ).join('');
            }
        }
        
        async function applyTagsToMemoryDirect(index) {
            const memory = untaggedMemories[index];
            if (!memory?.generatedTags?.length) return;
            
            try {
                const data = await api(`/memories/${memory.id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ tags: memory.generatedTags })
                });
                
                if (data.success) {
                    memory.tags = memory.generatedTags;
                    const tagsContainer = document.getElementById(`tags-${memory.id}`);
                    tagsContainer.innerHTML = memory.tags.map(t => `<span class="memory-tag">#${t}</span>`).join('');
                    showToast('标签已应用');
                }
            } catch (err) {
                showToast('应用失败: ' + err.message);
            }
        }
        
        async function batchGenerateTags() {
            if (untaggedMemories.length === 0) {
                showToast('请先加载无标签记忆');
                return;
            }
            
            if (!selectedProvider) {
                showToast('请选择 LLM 提供商');
                return;
            }
            
            showToast('开始批量生成标签...');
            
            for (let i = 0; i < Math.min(untaggedMemories.length, 5); i++) {
                await generateTagsForMemory(i);
                await new Promise(r => setTimeout(r, 500));
            }
            
            showToast('批量生成完成');
        }

        function copyTags(tags) {
            navigator.clipboard.writeText(tags.map(t => `#${t}`).join(' '));
            showToast('标签已复制');
        }

        async function assessImportance() {
            const content = document.getElementById('importanceInput').value.trim();
            if (!content) {
                showToast('请输入内容');
                return;
            }
            
            document.getElementById('importanceResult').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const data = await api('/intelligence/importance/assess', {
                    method: 'POST',
                    body: JSON.stringify({ 
                        content,
                        provider: selectedProvider
                    })
                });
                
                if (data.success) {
                    const percent = ((data.importance || 0.5) * 100).toFixed(0);
                    let level = '一般';
                    let color = 'var(--accent-cyan)';
                    
                    if (data.importance >= 0.9) { level = '非常重要'; color = 'var(--accent-red)'; }
                    else if (data.importance >= 0.7) { level = '重要'; color = 'var(--accent-orange)'; }
                    else if (data.importance >= 0.5) { level = '一般'; color = 'var(--accent-cyan)'; }
                    else if (data.importance >= 0.3) { level = '较低'; color = 'var(--accent-blue)'; }
                    else { level = '不重要'; color = 'var(--text-secondary)'; }
                    
                    document.getElementById('importanceResult').innerHTML = `
                        <div style="text-align: center; padding: 24px;">
                            <div style="font-size: 3rem; font-weight: 700; color: ${color};">${percent}%</div>
                            <div style="font-size: 1.25rem; margin-top: 8px;">${level}</div>
                            <div style="background: var(--bg-secondary); border-radius: 8px; height: 12px; margin-top: 16px; overflow: hidden;">
                                <div style="background: ${color}; height: 100%; width: ${percent}%; transition: width 0.5s;"></div>
                            </div>
                        </div>
                    `;
                }
            } catch (err) {
                document.getElementById('importanceResult').innerHTML = `<div class="empty-state"><p style="color: var(--accent-red);">评估失败: ${err.message}</p></div>`;
            }
        }

        async function loadEntities() {
            const data = await api('/intelligence/entities');
            const el = document.getElementById('entitiesList');
            el.className = 'list-container';
            if (data.success) {
                const colors = { person: '#22C55E', place: '#3B82F6', event: '#F97316', concept: '#A855F7', other: '#06B6D4' };
                const entities = data.entities || [];
                el.innerHTML = entities.length ? 
                    entities.map((e, index) => `
                        <div class="list-item" style="display:flex;align-items:center;gap:12px;width:100%;box-sizing:border-box;">
                            <div class="item-index" style="min-width:28px;height:28px;background:var(--gradient-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.75rem;color:#fff;flex-shrink:0;">${index + 1}</div>
                            <div class="list-item-content" style="flex:1;min-width:0;">
                                <div class="list-item-title" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${e.entity_name || ''}">${e.entity_name}</div>
                                <div class="list-item-meta" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">出现 ${e.frequency} 次</div>
                            </div>
                            <span class="badge badge-info flex-shrink-0">${e.entity_type}</span>
                        </div>
                    `).join('') : 
                    '<div class="empty-state"><p>暂无实体数据</p></div>';
            }
        }

        async function loadGraph() {
            const stats = await api('/intelligence/graph/stats');
            if (stats.success) {
                document.getElementById('nodeCount').textContent = stats.stats?.nodeCount || 0;
                document.getElementById('edgeCount').textContent = stats.stats?.edgeCount || 0;
                document.getElementById('entityCount').textContent = stats.stats?.topEntities?.length || 0;
            }
            
            const graph = await api('/intelligence/graph?limit=30');
            if (graph.success) renderGraph(graph);
        }

        function renderGraph(data) {
            const container = document.getElementById('graphContainer');
            const canvas = document.getElementById('graphCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
            
            const nodes = data.nodes || [];
            const edges = data.edges || [];
            
            const nodePositions = nodes.map((n, i) => ({
                x: 50 + Math.random() * (canvas.width - 100),
                y: 50 + Math.random() * (canvas.height - 100),
                ...n
            }));
            
            ctx.strokeStyle = 'rgba(0, 255, 170, 0.2)';
            ctx.lineWidth = 1;
            edges.forEach(e => {
                const source = nodePositions.find(n => n.id === e.source);
                const target = nodePositions.find(n => n.id === e.target);
                if (source && target) {
                    ctx.beginPath();
                    ctx.moveTo(source.x, source.y);
                    ctx.lineTo(target.x, target.y);
                    ctx.stroke();
                }
            });
            
            const colors = { person: '#22C55E', place: '#3B82F6', event: '#F97316', concept: '#A855F7', other: '#06B6D4' };
            nodePositions.forEach(n => {
                ctx.beginPath();
                ctx.arc(n.x, n.y, 5 + (n.weight || 0.5) * 10, 0, Math.PI * 2);
                ctx.fillStyle = colors[n.type] || '#00FFAA';
                ctx.fill();
                
                ctx.fillStyle = '#F8FAFC';
                ctx.font = '11px Fira Sans';
                ctx.textAlign = 'center';
                ctx.fillText(n.name, n.x, n.y + 20);
            });
        }

        async function loadStats() {
            const stats = await api('/intelligence/graph/stats');
            if (stats.success) {
                document.getElementById('nodeCount').textContent = stats.stats?.nodeCount || 0;
                document.getElementById('edgeCount').textContent = stats.stats?.edgeCount || 0;
                document.getElementById('entityCount').textContent = stats.stats?.topEntities?.length || 0;
            }
        }

        function refreshData() {
            showToast('正在刷新...');
            loadProviders();
            loadStats();
        }

        loadProviders();
        loadStats();
    </script>
</body>
</html>
