<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享内容 - 777-MS Memory System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .share-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .share-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .share-header .logo {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .share-content {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .share-meta {
            display: flex;
            justify-content: space-between;
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .share-tags .tag {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin: 2px;
        }
        .expired-notice {
            text-align: center;
            padding: 40px;
        }
        .expired-notice i {
            font-size: 64px;
            color: #dc3545;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="share-container">
        <div class="share-header">
            <div class="logo">
                <i class="bi bi-share-fill text-primary"></i>
            </div>
            <h4>分享内容</h4>
            <p class="text-muted">来自 777-MS Memory System</p>
        </div>
        
        <div id="loadingState">
            <div class="text-center py-4">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
                <p class="mt-3 text-muted">正在加载分享内容...</p>
            </div>
        </div>
        
        <div id="contentState" style="display: none;">
            <div class="share-meta">
                <span id="shareAuthor">
                    <i class="bi bi-person me-1"></i>
                    <span id="authorName">匿名用户</span>
                </span>
                <span id="shareDate">
                    <i class="bi bi-clock me-1"></i>
                    <span id="shareTime">-</span>
                </span>
            </div>
            
            <div class="share-content">
                <h5 id="shareTitle" class="mb-3">分享标题</h5>
                <div id="shareBody">
                    分享内容将在这里显示...
                </div>
            </div>
            
            <div class="share-tags" id="shareTags">
            </div>
            
            <div class="mt-4 text-center">
                <a href="/" class="btn btn-primary">
                    <i class="bi bi-box-arrow-in-right me-2"></i>
                    登录查看更多
                </a>
            </div>
        </div>
        
        <div id="expiredState" style="display: none;">
            <div class="expired-notice">
                <i class="bi bi-exclamation-triangle"></i>
                <h5>链接已失效</h5>
                <p class="text-muted">此分享链接已过期或不存在</p>
                <a href="/" class="btn btn-primary mt-3">
                    <i class="bi bi-house me-2"></i>
                    返回首页
                </a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = window.location.origin + '/api/v1';
        
        document.addEventListener('DOMContentLoaded', () => {
            loadSharedContent();
        });
        
        async function loadSharedContent() {
            const path = window.location.pathname;
            const shareCode = path.split('/').pop();
            
            if (!shareCode || shareCode === 'share') {
                showExpired();
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/share/${shareCode}`);
                const data = await response.json();
                
                if (data.success && data.data) {
                    showContent(data.data);
                } else {
                    showExpired();
                }
            } catch (error) {
                console.error('加载分享内容失败:', error);
                showExpired();
            }
        }
        
        function showContent(data) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('contentState').style.display = 'block';
            
            document.getElementById('shareTitle').textContent = data.title || '分享内容';
            document.getElementById('shareBody').innerHTML = formatContent(data.content || '');
            document.getElementById('authorName').textContent = data.author || '匿名用户';
            document.getElementById('shareTime').textContent = data.createdAt 
                ? new Date(data.createdAt).toLocaleString() 
                : '-';
            
            if (data.tags && data.tags.length > 0) {
                const tagsHtml = data.tags.map(tag => 
                    `<span class="tag">${tag}</span>`
                ).join('');
                document.getElementById('shareTags').innerHTML = tagsHtml;
            }
        }
        
        function showExpired() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('expiredState').style.display = 'block';
        }
        
        function formatContent(content) {
            return content
                .replace(/\n/g, '<br>')
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre class="bg-light p-2 rounded"><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code class="bg-light px-1 rounded">$1</code>');
        }
    </script>
</body>
</html>
