<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 777-MS Memory System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #020617;
            --bg-secondary: #0F172A;
            --bg-tertiary: #1E293B;
            --bg-glass: rgba(15, 23, 42, 0.7);
            --bg-glass-hover: rgba(30, 41, 59, 0.8);
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --accent-primary: #0891B2;
            --accent-secondary: #22D3EE;
            --accent-cta: #22C55E;
            --accent-red: #EF4444;
            --border-glass: rgba(255, 255, 255, 0.1);
            --gradient-primary: linear-gradient(135deg, #0891B2 0%, #22D3EE 50%, #22C55E 100%);
            --shadow-glow: 0 0 40px rgba(8, 145, 178, 0.3), 0 0 80px rgba(34, 211, 238, 0.15);
            --shadow-glass: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(8, 145, 178, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(34, 197, 94, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 60%);
        }
        
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 300%;
            height: 300%;
            top: -100%;
            left: -100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(8, 145, 178, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(34, 211, 238, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(34, 197, 94, 0.06) 0%, transparent 50%);
            animation: bgFloat 25s ease-in-out infinite;
        }
        
        .bg-animation::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: 
                radial-gradient(circle at 30% 40%, rgba(139, 92, 246, 0.06) 0%, transparent 35%),
                radial-gradient(circle at 70% 60%, rgba(6, 182, 212, 0.05) 0%, transparent 35%);
            animation: bgPulse 20s ease-in-out infinite reverse;
        }
        
        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            25% { transform: translate(3%, 2%) rotate(2deg) scale(1.02); }
            50% { transform: translate(-2%, 4%) rotate(-1deg) scale(1); }
            75% { transform: translate(2%, -3%) rotate(1deg) scale(1.01); }
        }
        
        @keyframes bgPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }
        
        .floating-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: orbFloat 15s ease-in-out infinite;
            z-index: -1;
        }
        
        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent-primary);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        
        .orb-2 {
            width: 300px;
            height: 300px;
            background: var(--accent-cta);
            bottom: -80px;
            right: -80px;
            animation-delay: -5s;
        }
        
        .orb-3 {
            width: 250px;
            height: 250px;
            background: var(--accent-secondary);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
            opacity: 0.2;
        }
        
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }
        
        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 24px;
            position: relative;
            z-index: 1;
        }
        
        .login-card {
            background: var(--bg-glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            padding: 48px 40px;
            box-shadow: var(--shadow-glass);
            position: relative;
            overflow: hidden;
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        }
        
        .login-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: radial-gradient(ellipse at bottom, rgba(8, 145, 178, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 36px;
            position: relative;
            z-index: 1;
        }
        
        .logo-icon {
            width: 72px;
            height: 72px;
            background: var(--gradient-primary);
            border-radius: var(--radius-lg);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-glow);
            transition: transform 0.3s ease;
            color: white;
        }
        
        .logo-icon:hover {
            transform: scale(1.05) rotate(-3deg);
        }
        
        .logo h1 {
            font-size: 26px;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }
        
        .logo p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 10px;
            font-weight: 500;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 32px;
            position: relative;
            z-index: 1;
        }
        
        .feature-item {
            text-align: center;
            padding: 16px 10px;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            transition: all 0.3s ease;
        }
        
        .feature-item:hover {
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(34, 211, 238, 0.3);
            transform: translateY(-2px);
        }
        
        .feature-item i {
            font-size: 22px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            display: block;
        }
        
        .feature-item span {
            display: block;
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .form-group {
            margin-bottom: 22px;
            position: relative;
            z-index: 1;
        }
        
        .form-label {
            display: block;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 0.02em;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            transition: color 0.3s ease;
        }
        
        .form-input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: rgba(2, 6, 23, 0.6);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--accent-secondary);
            box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.15), var(--shadow-glow);
            background: rgba(2, 6, 23, 0.8);
        }
        
        .form-input:focus + i,
        .input-wrapper:focus-within i {
            color: var(--accent-secondary);
        }
        
        .form-input::placeholder {
            color: var(--text-muted);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 4px 20px rgba(8, 145, 178, 0.35);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-glow), 0 8px 30px rgba(8, 145, 178, 0.45);
        }
        
        .btn-primary:active {
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-secondary);
            border: 1px solid var(--border-glass);
        }
        
        .btn-secondary:hover {
            background: rgba(51, 65, 85, 0.7);
            color: var(--text-primary);
            transform: translateY(-2px);
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            color: var(--text-muted);
            font-size: 13px;
            position: relative;
            z-index: 1;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-glass), transparent);
        }
        
        .divider span {
            padding: 0 20px;
            font-weight: 500;
        }
        
        .back-link {
            text-align: center;
            margin-top: 24px;
            position: relative;
            z-index: 1;
        }
        
        .back-link a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .back-link a:hover {
            color: var(--accent-secondary);
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            margin-bottom: 24px;
            color: var(--accent-red);
            font-size: 14px;
            display: none;
            position: relative;
            z-index: 1;
        }
        
        .error-message i {
            margin-right: 8px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
            position: relative;
            z-index: 1;
        }
        
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-glass);
            border-top-color: var(--accent-secondary);
            border-right-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading p {
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            padding: 16px 28px;
            border-radius: var(--radius-lg);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: var(--shadow-glass);
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.success {
            border-color: rgba(34, 197, 94, 0.3);
            color: var(--accent-cta);
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 16px;
            }
            
            .login-card {
                padding: 36px 24px;
            }
            
            .features {
                gap: 10px;
            }
            
            .feature-item {
                padding: 12px 6px;
            }
            
            .logo-icon {
                width: 60px;
                height: 60px;
                font-size: 26px;
            }
            
            .logo h1 {
                font-size: 22px;
            }
        }
        
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-animation"></div>
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>
    <div class="floating-orb orb-3"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <i class="bi bi-brain"></i>
                </div>
                <h1>777-MS Memory System</h1>
                <p>AI 智能记忆管理系统</p>
            </div>
            
            <div class="features">
                <div class="feature-item">
                    <i class="bi bi-infinity"></i>
                    <span>无限上下文</span>
                </div>
                <div class="feature-item">
                    <i class="bi bi-robot"></i>
                    <span>LLM自动管理</span>
                </div>
                <div class="feature-item">
                    <i class="bi bi-shield-check"></i>
                    <span>数据隔离</span>
                </div>
            </div>
            
            <div id="errorMessage" class="error-message">
                <i class="bi bi-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <div class="input-wrapper">
                        <input type="text" class="form-input" id="username" placeholder="请输入用户名" required autocomplete="username">
                        <i class="bi bi-person"></i>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="请输入密码" required autocomplete="current-password">
                        <i class="bi bi-lock"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right"></i> 登录
                </button>
            </form>
            
            <div class="divider">
                <span>或</span>
            </div>
            
            <button class="btn btn-secondary" id="backHomeBtn">
                <i class="bi bi-house"></i> 返回首页
            </button>
            
            <div class="back-link">
                <a href="/">还没有账号？返回首页了解更多</a>
            </div>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在登录...</p>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        const API_BASE = '/api/v1';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const loadingDiv = document.getElementById('loading');
            const loginCard = document.querySelector('.login-card');
            
            if (!username || !password) {
                errorText.textContent = '请输入用户名和密码';
                errorDiv.style.display = 'block';
                return;
            }
            
            errorDiv.style.display = 'none';
            loginCard.style.display = 'none';
            loadingDiv.style.display = 'block';
            
            try {
                const response = await fetch(`${API_BASE}/user/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    showToast('登录成功！', true);
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 500);
                } else {
                    errorText.textContent = data.message || '登录失败';
                    errorDiv.style.display = 'block';
                    loginCard.style.display = 'block';
                    loadingDiv.style.display = 'none';
                }
            } catch (error) {
                errorText.textContent = '网络错误，请稍后重试';
                errorDiv.style.display = 'block';
                loginCard.style.display = 'block';
                loadingDiv.style.display = 'none';
            }
        });
        
        function showToast(msg, isSuccess = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show' + (isSuccess ? ' success' : '');
            setTimeout(() => toast.className = 'toast', 2500);
        }
        
        document.getElementById('backHomeBtn').addEventListener('click', () => {
            window.location.href = '/';
        });
        
        const token = localStorage.getItem('token');
        if (token) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
