<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 777-MS</title>
    <link rel="stylesheet" href="/styles.css?v=20260228-v2">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Z"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                </div>
                <span class="sidebar-logo-text">777-MS</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>概览</a>
                <a href="/chat" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>对话</a>
                <a href="/intelligence" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>智能功能</a>
                <a href="/review" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>记忆复习</a>
                <a href="/visualization" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>数据可视化</a>
                <a href="/security" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>安全设置</a>
                <a href="/providers" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>LLM路由</a>
                <a href="/admin" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>管理后台</a>
            </nav>
            <div class="sidebar-user">
                <a href="/profile" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>个人资料</a>
                <button class="nav-item logout-btn" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>退出登录</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h1 class="page-title">管理后台</h1>
                <div class="page-actions">
                    <span class="badge badge-warning">管理员</span>
                </div>
            </header>

            <div class="grid grid-4 mb-4">
                <div class="stat-card"><div class="stat-value" id="userCount">0</div><div class="stat-label">用户总数</div></div>
                <div class="stat-card"><div class="stat-value" id="memoryCount">0</div><div class="stat-label">记忆总数</div></div>
                <div class="stat-card"><div class="stat-value" id="sessionCount">0</div><div class="stat-label">会话总数</div></div>
                <div class="stat-card"><div class="stat-value" id="providerCount">0</div><div class="stat-label">活跃提供商</div></div>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="showPanel('users')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>用户管理</button>
                <button class="tab" onclick="showPanel('providers')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>提供商管理</button>
                <button class="tab" onclick="showPanel('backups')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>备份管理</button>
            </div>

            <div id="users-panel" class="panel">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">用户列表</h3>
                        <div class="flex gap-2">
                            <input type="text" class="input" id="searchUser" placeholder="搜索用户..." style="width:200px;" onkeyup="filterUsers()">
                            <button class="btn btn-primary btn-sm" onclick="showAddUser()">添加用户</button>
                        </div>
                    </div>
                    <div id="addUserForm" style="display:none;padding:16px;border-bottom:1px solid var(--border-color);">
                        <div class="grid grid-2 gap-2 mb-2">
                            <input type="text" class="input" id="newUsername" placeholder="用户名">
                            <input type="email" class="input" id="newEmail" placeholder="邮箱">
                        </div>
                        <div class="grid grid-2 gap-2 mb-2">
                            <input type="password" class="input" id="newPassword" placeholder="密码">
                            <select class="input" id="newRole"><option value="user">普通用户</option><option value="admin">管理员</option></select>
                        </div>
                        <div class="flex gap-2">
                            <button class="btn btn-primary" onclick="createUser()">创建</button>
                            <button class="btn btn-secondary" onclick="hideAddUser()">取消</button>
                        </div>
                    </div>
                    <div id="editUserForm" style="display:none;padding:16px;border-bottom:1px solid var(--border-color);background:var(--bg-secondary);">
                        <h4 style="margin:0 0 12px 0;">编辑用户</h4>
                        <input type="hidden" id="editUserId">
                        <div class="grid grid-2 gap-2 mb-2">
                            <input type="text" class="input" id="editUsername" placeholder="用户名">
                            <input type="email" class="input" id="editEmail" placeholder="邮箱">
                        </div>
                        <div class="grid grid-2 gap-2 mb-2">
                            <select class="input" id="editRole"><option value="user">普通用户</option><option value="admin">管理员</option></select>
                            <select class="input" id="editStatus"><option value="active">活跃</option><option value="inactive">禁用</option><option value="banned">封禁</option></select>
                        </div>
                        <div class="flex gap-2">
                            <button class="btn btn-primary" onclick="updateUser()">保存</button>
                            <button class="btn btn-secondary" onclick="hideEditUser()">取消</button>
                        </div>
                    </div>
                    <div id="usersList" class="loading"><div class="spinner"></div></div>
                </div>
            </div>

            <div id="providers-panel" class="panel" style="display:none;">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">LLM 提供商</h3>
                        <button class="btn btn-primary btn-sm" onclick="showAddProvider()">添加提供商</button>
                    </div>
                    <div id="addProviderForm" style="display:none;padding:16px;border-bottom:1px solid var(--border-color);">
                        <div class="grid grid-2 gap-2 mb-2">
                            <input type="text" class="input" id="providerName" placeholder="提供商名称 (如 openai)">
                            <input type="text" class="input" id="providerDisplayName" placeholder="显示名称">
                        </div>
                        <input type="text" class="input mb-2" id="providerBaseUrl" placeholder="API Base URL">
                        <input type="text" class="input mb-2" id="providerApiKey" placeholder="API Key">
                        <div class="flex gap-2">
                            <button class="btn btn-primary" onclick="createProvider()">创建</button>
                            <button class="btn btn-secondary" onclick="hideAddProvider()">取消</button>
                        </div>
                    </div>
                    <div id="providersList" class="loading"><div class="spinner"></div></div>
                </div>
            </div>

            <div id="backups-panel" class="panel" style="display:none;">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">数据备份</h3>
                        <button class="btn btn-primary btn-sm" onclick="createBackup()">创建备份</button>
                    </div>
                    <div id="backupsList" class="loading"><div class="spinner"></div></div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = '/api/v1';
        let token = localStorage.getItem('token');

        if (!token) window.location.href = '/login';

        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        async function api(e, o = {}) { 
            const r = await fetch(API_BASE + e, { ...o, headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', ...o.headers } }); 
            if (r.status === 401) { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = '/login'; return { success: false, message: '登录已过期' }; }
            return r.json(); 
        }
        function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = '/login'; }

        function showPanel(name) {
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(name + '-panel').style.display = 'block';
            event.target.closest('.tab').classList.add('active');
            const loaders = { users: loadUsers, providers: loadProviders, backups: loadBackups };
            if (loaders[name]) loaders[name]();
        }

        async function loadStats() {
            const stats = await api('/admin/stats');
            if (stats.success) {
                document.getElementById('userCount').textContent = stats.data?.users || 0;
                document.getElementById('memoryCount').textContent = stats.data?.memories || 0;
                document.getElementById('sessionCount').textContent = stats.data?.sessions || 0;
                document.getElementById('providerCount').textContent = stats.data?.providers || 0;
            }
        }

        function showAddUser() { document.getElementById('addUserForm').style.display = 'block'; }
        function hideAddUser() { document.getElementById('addUserForm').style.display = 'none'; }
        function showAddProvider() { document.getElementById('addProviderForm').style.display = 'block'; }
        function hideAddProvider() { document.getElementById('addProviderForm').style.display = 'none'; }

        async function loadUsers() {
            const data = await api('/admin/users');
            if (data.success) {
                window.allUsers = data.data?.users || [];
                renderUsers(window.allUsers);
            }
        }

        function filterUsers() {
            const query = document.getElementById('searchUser').value.toLowerCase();
            if (!window.allUsers) return;
            const filtered = window.allUsers.filter(u => 
                (u.username || '').toLowerCase().includes(query) || 
                (u.email || '').toLowerCase().includes(query)
            );
            renderUsers(filtered);
        }

        function renderUsers(users) {
            const el = document.getElementById('usersList');
            el.className = '';
            el.innerHTML = users.length ? users.map((u, index) => `
                <div class="list-item" style="display:flex;align-items:center;gap:12px;width:100%;box-sizing:border-box;">
                    <div class="item-index" style="min-width:32px;height:32px;background:var(--gradient-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.875rem;color:#fff;">${index + 1}</div>
                    <div class="list-item-content" style="flex:1;min-width:0;">
                        <div class="list-item-title" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${u.username || ''}">${u.username || '-'}</div>
                        <div class="list-item-meta" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${u.email || '-'} · ${u.role || 'user'} · <span style="color:${u.status === 'active' ? 'var(--accent-green)' : 'var(--accent-red)'}">${u.status || '-'}</span></div>
                    </div>
                    <div class="flex gap-1 flex-shrink-0">
                        <button class="btn btn-secondary btn-sm" onclick="showEditUser('${u.id}', '${u.username || ''}', '${u.email || ''}', '${u.role || 'user'}', '${u.status || 'active'}')">编辑</button>
                        <button class="btn btn-secondary btn-sm" onclick="resetPassword('${u.id}')">重置密码</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">删除</button>
                    </div>
                </div>
            `).join('') : '<div class="empty-state"><p>暂无用户</p></div>';
        }

        function showEditUser(id, username, email, role, status) {
            document.getElementById('editUserId').value = id;
            document.getElementById('editUsername').value = username;
            document.getElementById('editEmail').value = email;
            document.getElementById('editRole').value = role;
            document.getElementById('editStatus').value = status;
            document.getElementById('editUserForm').style.display = 'block';
        }

        function hideEditUser() {
            document.getElementById('editUserForm').style.display = 'none';
        }

        async function updateUser() {
            const id = document.getElementById('editUserId').value;
            const username = document.getElementById('editUsername').value;
            const email = document.getElementById('editEmail').value;
            const role = document.getElementById('editRole').value;
            const status = document.getElementById('editStatus').value;
            
            const data = await api('/admin/users/' + id, {
                method: 'PUT',
                body: JSON.stringify({ username, email, role, status })
            });
            if (data.success) {
                showToast('用户更新成功');
                hideEditUser();
                loadUsers();
            } else {
                showToast(data.message || '更新失败');
            }
        }

        async function createUser() {
            const username = document.getElementById('newUsername').value;
            const email = document.getElementById('newEmail').value;
            const password = document.getElementById('newPassword').value;
            if (!username || !email || !password) { showToast('请填写完整信息'); return; }
            const data = await api('/admin/users', { method: 'POST', body: JSON.stringify({ username, email, password, role: document.getElementById('newRole').value }) });
            if (data.success) { showToast('用户创建成功'); hideAddUser(); loadUsers(); loadStats(); }
            else { showToast(data.message || '创建失败'); }
        }

        async function deleteUser(id) {
            if (!confirm('确定删除此用户？')) return;
            const data = await api('/admin/users/' + id, { method: 'DELETE' });
            if (data.success) { showToast('已删除'); loadUsers(); loadStats(); }
        }

        async function resetPassword(id) {
            const pwd = prompt('请输入新密码:');
            if (!pwd) return;
            const data = await api('/admin/users/' + id + '/password', { method: 'PUT', body: JSON.stringify({ newPassword: pwd }) });
            if (data.success) showToast('密码已重置');
        }

        async function loadProviders() {
            const data = await api('/admin/providers');
            if (data.success) {
                const providers = data.data?.providers || [];
                const el = document.getElementById('providersList');
                el.className = '';
                el.innerHTML = providers.length ? providers.map((p, index) => `
                    <div class="list-item" style="display:flex;align-items:center;gap:12px;width:100%;box-sizing:border-box;">
                        <div class="item-index" style="min-width:32px;height:32px;background:var(--gradient-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.875rem;color:#fff;">${index + 1}</div>
                        <div class="list-item-content" style="flex:1;min-width:0;">
                            <div class="list-item-title" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${p.display_name || p.name || ''}">${p.display_name || p.name}</div>
                            <div class="list-item-meta" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name} · ${p.is_active ? '<span style="color:var(--accent-green)">活跃</span>' : '<span style="color:var(--accent-red)">禁用</span>'}</div>
                        </div>
                        <div class="flex gap-1 flex-shrink-0">
                            <button class="btn btn-secondary btn-sm" onclick="toggleProvider('${p.id}', ${!p.is_active})">${p.is_active ? '禁用' : '启用'}</button>
                        </div>
                    </div>
                `).join('') : '<div class="empty-state"><p>暂无提供商</p></div>';
            }
        }

        async function createProvider() {
            const name = document.getElementById('providerName').value;
            const displayName = document.getElementById('providerDisplayName').value;
            const baseUrl = document.getElementById('providerBaseUrl').value;
            const apiKey = document.getElementById('providerApiKey').value;
            if (!name) { showToast('请输入提供商名称'); return; }
            const data = await api('/admin/providers', { method: 'POST', body: JSON.stringify({ name, display_name: displayName, api_endpoint: baseUrl, api_key: apiKey }) });
            if (data.success) { showToast('提供商创建成功'); hideAddProvider(); loadProviders(); loadStats(); }
        }

        async function toggleProvider(id, active) {
            const data = await api('/admin/providers/' + id, { method: 'PUT', body: JSON.stringify({ is_active: active }) });
            if (data.success) { showToast(active ? '已启用' : '已禁用'); loadProviders(); }
        }

        async function loadBackups() {
            const el = document.getElementById('backupsList');
            el.className = '';
            el.innerHTML = '<div class="empty-state"><p>备份功能开发中...</p></div>';
        }

        async function createBackup() {
            showToast('备份功能开发中...');
        }

        loadStats();
        loadUsers();
    </script>
</body>
</html>
